<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Project Frontend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>DevOps Project</h1>
    <p id="message">Loading message from backend...</p>
    <button id="refresh">Refresh</button>

    <hr>

    <h2>Notes</h2>
    <ul id="notes-list"></ul>
    <form id="note-form">
      <input id="note-input" type="text" placeholder="Add a note" required>
      <button type="submit">Add</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
