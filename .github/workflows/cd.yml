name: CD

on:
  push:
    branches: [master, main]

env:
  PROJECT_ID: project-61969037-62f2-4a50-8c5
  REGION: us-central1
  REPO: devops-project
  WIF_PROVIDER: projects/252094799492/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-actions-deployer@project-61969037-62f2-4a50-8c5.iam.gserviceaccount.com
  DB_INSTANCE_CONNECTION_NAME: project-61969037-62f2-4a50-8c5:us-central1:devops-project-db
  DB_NAME: devops_project
  DB_USER: appuser
  DB_SECRET_ID: devops-project-db-password
  RUNTIME_SERVICE_ACCOUNT: devops-backend-runtime@project-61969037-62f2-4a50-8c5.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devops_project
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: devops_project

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:${{ github.sha }} ./backend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        id: backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: devops-backend
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --port=3001
            --add-cloudsql-instances=${{ env.DB_INSTANCE_CONNECTION_NAME }}
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --set-env-vars=DB_SOCKET_PATH=/cloudsql/${{ env.DB_INSTANCE_CONNECTION_NAME }},DB_NAME=${{ env.DB_NAME }},DB_USER=${{ env.DB_USER }}
            --set-secrets=DB_PASSWORD=${{ env.DB_SECRET_ID }}:latest

      - name: Point frontend at deployed backend URL
        run: |
          sed -i "s#http://localhost:3001#${{ steps.backend.outputs.url }}#" frontend/script.js

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${{ github.sha }}

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: devops-frontend
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${{ github.sha }}
          flags: --allow-unauthenticated --port=80
